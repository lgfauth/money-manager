services:
  mongodb:
    image: mongo:8.0
    container_name: moneymanager-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: MoneyAgent
    volumes:
      - mongodb_data:/data/db
    networks:
      - moneymanager-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0
    container_name: moneymanager-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_MONGODB_DATABASE: MoneyAgent
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - moneymanager-network

  api:
    build:
      context: .
      dockerfile: src/MoneyManager.Presentation/Dockerfile
    container_name: moneymanager-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=MoneyAgent
      - Jwt__SecretKey=your-super-secret-key-that-is-long-enough-for-256-bits
      - Jwt__Issuer=MoneyManager
      - Jwt__Audience=MoneyManagerUsers
      - Jwt__ExpirationHours=24
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - moneymanager-network

  web:
    build:
      context: .
      dockerfile: src/MoneyManager.Web/Dockerfile
    container_name: moneymanager-web
    ports:
      - "8000:80"
    environment:
      - ApiUrl=http://api:5000
    depends_on:
      - api

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile.admin-api
    container_name: moneymanager-admin-api
    ports:
      - "5091:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=MoneyAgent
      - AdminAuth__SecretKey=admin-secret-key-at-least-32-chars-long
      - AdminAuth__Username=admin
      - AdminAuth__Password=CHANGE_ME
      - AdminAuth__Role=admin
      - AdminCors__AllowedOrigins__0=http://localhost:3010
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - moneymanager-network

  admin:
    build:
      context: src/MoneyManager.Administration
      dockerfile: Dockerfile
    container_name: moneymanager-admin
    ports:
      - "3010:3000"
    environment:
      - ADMIN_API_URL=http://admin-api:8080
    depends_on:
      - admin-api
    networks:
      - moneymanager-network
